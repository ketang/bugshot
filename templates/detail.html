<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugshot — {{filename}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav class="detail-nav">
            <div class="detail-nav-slot detail-nav-left">
                <span id="prev-slot"></span>
            </div>
            <div class="detail-nav-slot detail-nav-center">
                <a href="/" class="btn" id="index-btn">Index</a>
            </div>
            <div class="detail-nav-slot detail-nav-right">
                <span id="next-slot"></span>
            </div>
        </nav>
    </header>
    <main class="detail-main">
        <div class="detail-shortcut-legend">1-9 jump · 0 last · g go to # · s size · n next · p previous · i index · q quit · / comment · Esc unfocus</div>
        <div class="detail-content">
            <div id="image-container">
                <!-- Image or ANSI content injected by gallery.js -->
            </div>
            <div class="detail-filename">{{filename}}</div>
        </div>
        <div class="comment-section">
            <form id="comment-form">
                <input type="text" id="comment-input" placeholder="Describe an issue..." autocomplete="off">
                <button type="submit" class="btn">Submit</button>
            </form>
            <div id="comments-list">
                <!-- Populated by gallery.js -->
            </div>
        </div>
        <div class="detail-actions">
            <button id="detail-done-btn" class="btn btn-done">Done Reviewing</button>
        </div>
    </main>
    <script>
        window.__BUGSHOT_DETAIL__ = {
            filename: "{{filename}}",
            encodedName: "{{encoded_name}}",
            contentType: "{{content_type}}",
            imageSrc: "{{image_src}}",
            ansiHtml: "{{ansi_html}}",
            images: {{images_json}},
            nav: {{nav_json}}
        };
    </script>
    <script src="/static/gallery.js"></script>
</body>
</html>
