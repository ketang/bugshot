<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugshot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Bugshot</h1>
        <div class="controls">
            <button id="size-toggle" class="btn">Full Size</button>
            <button id="done-btn" class="btn btn-done">Done Reviewing</button>
        </div>
    </header>
    <div class="index-shortcut-legend">n/Enter first · p last · 1-9 jump · 0 last · g go to # · s size · q quit</div>
    <div id="gallery" class="gallery thumbnail-mode">
        <!-- Populated by gallery.js -->
    </div>
    <script>
        window.__BUGSHOT_IMAGES__ = {{images_json}};
    </script>
    <script src="/static/gallery.js"></script>
</body>
</html>
